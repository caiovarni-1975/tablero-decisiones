<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de decisiones</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 24px;
      background: #f7f7f7;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .contenedor {
      width: 100%;
      height: calc(100vh - 88px);
      padding: 0 24px 24px 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tablero de decisiones</h1>
  </div>

  <div class="contenedor">
    <div class="card">
      <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSBCniMPQSL9AB-c0dD4oxxMPp6KFWhZ0POPViUhYDMRdpO9Lp83tvKv7KSS-cgP1NTjPr6VHlwSSV2/pubhtml?gid=1322538543&single=true"></iframe>
    </div>
  </div>
</body>
</html>
