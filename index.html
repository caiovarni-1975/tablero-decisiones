<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tablero de Decisiones</title>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#21262d;
      --text:#e6edf3; --text-muted:#8b949e; --text-dim:#484f58;
      --accent:#58a6ff; --success:#3fb950; --danger:#f85149;
    }
    body.light {
      --bg:#ffffff; --surface:#f6f8fa; --border:#d0d7de;
      --text:#1f2328; --text-muted:#656d76; --text-dim:#aaaabc;
      --accent:#0969da; --success:#1a7f37; --danger:#d1242f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:0 0 40px; transition:background .2s,color .2s; }

    header { background:var(--surface); border-bottom:1px solid var(--border); padding:18px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; flex-wrap:wrap; gap:10px; }
    .header-left h1 { font-size:1.3rem; font-weight:700; color:var(--text); }
    .header-left p { font-size:0.82rem; color:var(--text-muted); margin-top:3px; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .theme-btn { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 10px; cursor:pointer; font-size:15px; color:var(--text); transition:all .15s; }
    .theme-btn:hover { border-color:var(--accent); }

    .stats { display:flex; gap:10px; padding:14px 24px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); }
    .stat-pill { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 14px; font-size:0.78rem; color:var(--text-muted); }
    .stat-pill span { color:var(--text); font-weight:600; }

    .filters { display:flex; gap:10px; padding:12px 24px; flex-wrap:wrap; background:var(--bg); border-bottom:1px solid var(--border); }
    .filters select, .filters input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; font-size:0.82rem; outline:none; cursor:pointer; }
    .filters select:focus, .filters input:focus { border-color:var(--accent); }
    .filters label { font-size:0.78rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }

    .table-wrap { overflow-x:auto; padding:0 24px; margin-top:16px; }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    thead tr { border-bottom:2px solid var(--border); }
    thead th { text-align:left; padding:10px 14px; color:var(--text-muted); font-weight:600; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; cursor:pointer; user-select:none; }
    thead th:hover { color:var(--text); }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:hover { background:var(--surface); }
    tbody td { padding:12px 14px; vertical-align:top; color:var(--text-muted); }
    td.producto { font-weight:600; color:var(--text); white-space:nowrap; }
    td.canal { white-space:nowrap; }
    td.numero { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    td.motivo { max-width:240px; font-size:0.82rem; line-height:1.4; }
    td.proximo { max-width:260px; font-size:0.82rem; line-height:1.4; color:var(--text); }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; white-space:nowrap; }
    .badge-PAUSAR         { background:#da3633; color:#fff; }
    .badge-LIQUIDAR       { background:#d29922; color:#fff; }
    .badge-RIESGO_QUIEBRE { background:#f07c00; color:#fff; }
    .badge-EMPUJAR        { background:#238636; color:#fff; }
    .badge-OK             { background:#1f6feb; color:#fff; }
    .badge-AJUSTAR_PRECIO { background:#6e40c9; color:#fff; }
    .badge-SIN_HISTORIAL  { background:#484f58; color:#e6edf3; }
    .badge-default        { background:#30363d; color:#c9d1d9; }

    .loading { text-align:center; padding:80px 0; color:var(--text-muted); font-size:0.9rem; }
    .error { text-align:center; padding:60px 24px; color:var(--danger); font-size:0.9rem; }
    .empty-row td { text-align:center; padding:40px; color:var(--text-muted); }

    @media(max-width:600px){ .table-wrap{ padding:0 12px; } .filters,.stats{ padding:10px 12px; } header{ padding:14px 12px; } }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Tablero de Decisiones</h1>
    <p id="subtitle">Cargando...</p>
  </div>
  <div class="header-right">
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="filters">
  <label>Canal:
    <select id="filtroCanal"><option value="">Todos</option></select>
  </label>
  <label>Accion:
    <select id="filtroAccion"><option value="">Todas</option></select>
  </label>
  <label>Producto:
    <input type="text" id="filtroProducto" placeholder="Buscar producto..." style="width:180px"/>
  </label>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Cargando datos...</div>
  <table id="tabla" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('rank')">#</th>
        <th onclick="sortBy('producto')">Producto</th>
        <th onclick="sortBy('canal')">Canal</th>
        <th onclick="sortBy('accion')">Accion</th>
        <th>Motivo</th>
        <th onclick="sortBy('margen')" style="text-align:right">Margen %</th>
        <th onclick="sortBy('cobertura')" style="text-align:right">Cobertura</th>
        <th>Proximo Paso</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBCniMPQSL9AB-c0dD4oxxMPp6KFWhZ0POPViUhYDMRdpO9Lp83tvKv7KSS-cgP1NTjPr6VHlwSSV2/pub?output=csv&gid=1322538543';
  var ORDEN_ACCIONES = ['PAUSAR','RIESGO_QUIEBRE','LIQUIDAR','AJUSTAR_PRECIO','EMPUJAR','OK','SIN_HISTORIAL'];
  var allRows = [];
  var currentSort = { key:'rank', dir:1 };
  var isDark = true;

  function toggleTheme(){
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  }

  function parseCSV(text) {
    var lines = text.trim().split('\n');
    var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,'').toLowerCase(); });
    return lines.slice(1).map(function(line){
      var vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
      var obj = {};
      headers.forEach(function(h,i){ obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); });
      return obj;
    });
  }

  function badgeClass(accion) {
    var a = (accion||'').toUpperCase().replace(/\s/g,'_');
    var map = {PAUSAR:'PAUSAR',LIQUIDAR:'LIQUIDAR',RIESGO_QUIEBRE:'RIESGO_QUIEBRE',EMPUJAR:'EMPUJAR',OK:'OK',AJUSTAR_PRECIO:'AJUSTAR_PRECIO',SIN_HISTORIAL:'SIN_HISTORIAL'};
    return 'badge badge-'+(map[a]||'default');
  }

  function getMargenVal(r){
    var m = parseFloat(r.margen_neto_pct||r.margen_neto_porcentaje||r.margen_neto||0);
    return Math.abs(m) < 2 ? m*100 : m;
  }

  function sortRows(rows){
    return rows.slice().sort(function(a,b){
      var k = currentSort.key; var d = currentSort.dir;
      if (k==='rank'||k==='accion'){
        var ai=ORDEN_ACCIONES.indexOf((a.accion||'').toUpperCase());
        var bi=ORDEN_ACCIONES.indexOf((b.accion||'').toUpperCase());
        var an=ai===-1?99:ai; var bn=bi===-1?99:bi;
        if (an!==bn) return (an-bn)*d;
        return (getMargenVal(a)-getMargenVal(b))*d;
      }
      if (k==='margen') return (getMargenVal(a)-getMargenVal(b))*d;
      if (k==='cobertura'){
        return (parseFloat(a.cobertura_stock||a.cobertura||0)-parseFloat(b.cobertura_stock||b.cobertura||0))*d;
      }
      var av=(a[k]||'').toLowerCase(); var bv=(b[k]||'').toLowerCase();
      return av<bv?-d:av>bv?d:0;
    });
  }

  function sortBy(key){
    if (currentSort.key===key) currentSort.dir*=-1;
    else { currentSort.key=key; currentSort.dir=1; }
    applyFilters();
  }

  function render(rows){
    var tbody = document.getElementById('tbody');
    if (!rows.length){ tbody.innerHTML='<tr class="empty-row"><td colspan="8">Sin resultados</td></tr>'; return; }
    var html='';
    rows.forEach(function(row,i){
      var margenVal = getMargenVal(row);
      var margenStr = isNaN(margenVal) ? '—' : margenVal.toFixed(1)+'%';
      var margenColor = margenVal < 0 ? 'var(--danger)' : margenVal < 10 ? '#d29922' : 'var(--success)';
      var cobVal = parseFloat(row.cobertura_stock||row.cobertura_sem||row.cobertura||'');
      var cobStr = isNaN(cobVal) ? '—' : cobVal.toFixed(1)+' sem';
      html +=
        '<tr>'+
          '<td style="color:var(--text-dim);font-weight:700;">'+(i+1)+'</td>'+
          '<td class="producto">'+(row.producto||'—')+'<br><small style="color:var(--text-muted);font-weight:400;font-size:0.75rem">'+(row.sku_id||'')+'</small></td>'+
          '<td class="canal">'+(row.canal_nombre||row.canal||'—')+'</td>'+
          '<td><span class="'+badgeClass(row.accion)+'">'+(row.accion||'—')+'</span></td>'+
          '<td class="motivo">'+(row.motivo||'—')+'</td>'+
          '<td class="numero" style="color:'+margenColor+'">'+margenStr+'</td>'+
          '<td class="numero">'+cobStr+'</td>'+
          '<td class="proximo">'+(row.proximo_paso||row['proximo paso']||row.proximo||'—')+'</td>'+
        '</tr>';
    });
    tbody.innerHTML = html;
  }

  function populateFilters(rows){
    var canales=[]; var acciones=[];
    rows.forEach(function(r){
      var c=r.canal_nombre||r.canal; if(c&&canales.indexOf(c)===-1) canales.push(c);
      var a=r.accion; if(a&&acciones.indexOf(a)===-1) acciones.push(a);
    });
    canales.sort();
    acciones.sort(function(a,b){ return ORDEN_ACCIONES.indexOf(a)-ORDEN_ACCIONES.indexOf(b); });
    var selC=document.getElementById('filtroCanal');
    canales.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; selC.appendChild(o); });
    var selA=document.getElementById('filtroAccion');
    acciones.forEach(function(a){ var o=document.createElement('option'); o.value=a; o.textContent=a; selA.appendChild(o); });
  }

  function applyFilters(){
    var canal=document.getElementById('filtroCanal').value;
    var accion=document.getElementById('filtroAccion').value;
    var prod=document.getElementById('filtroProducto').value.toLowerCase();
    var filtered=allRows.filter(function(r){
      if(canal&&(r.canal_nombre||r.canal)!==canal) return false;
      if(accion&&r.accion!==accion) return false;
      if(prod&&!(r.producto||'').toLowerCase().includes(prod)) return false;
      return true;
    });
    render(sortRows(filtered));
  }

  function renderStats(rows){
    var counts={};
    rows.forEach(function(r){ counts[r.accion]=(counts[r.accion]||0)+1; });
    var statsEl=document.getElementById('stats');
    statsEl.innerHTML=ORDEN_ACCIONES.filter(function(a){return counts[a];}).map(function(a){
      return '<div class="stat-pill">'+a+': <span>'+counts[a]+'</span></div>';
    }).join('');
  }

  function load(){
    fetch(CSV_URL)
      .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.text(); })
      .then(function(text){
        var rows=parseCSV(text);
        allRows=rows;
        var cliente=rows[0]&&rows[0].cliente_nombre||'Demo';
        var semana=rows[0]&&rows[0].semana_eval||'';
        document.getElementById('subtitle').textContent=cliente+' · '+semana+' · '+rows.length+' decisiones';
        document.title='Tablero · '+cliente;
        populateFilters(rows);
        renderStats(rows);
        render(sortRows(rows));
        document.getElementById('loading').style.display='none';
        document.getElementById('tabla').style.display='table';
        ['filtroCanal','filtroAccion','filtroProducto'].forEach(function(id){
          document.getElementById(id).addEventListener('change',applyFilters);
          document.getElementById(id).addEventListener('input',applyFilters);
        });
      })
      .catch(function(e){
        document.getElementById('loading').innerHTML='<div class="error">Error al cargar datos: '+e.message+'<br><small>Verifica que el Sheet este publicado como CSV</small></div>';
      });
  }

  load();
</script>
</body>
</html>
